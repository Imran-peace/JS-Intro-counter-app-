<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reassigning and Incrementing</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1>People Entered:</h1>
        <h2 id="count-el">0</h2>
        <!--Task2: Create a INCREMENT button with the id="increment-btn"  -->
         <button id="increment-btn" onclick="increment()">INCREMENT</button>
         <!-- Task: Create a SAVE button, set the id to "save-btn" and call the save() function when it's clicked. -->
        <button id="save-btn" onclick="save()">SAVE</button>

        <p id="save-el">Previous Entries: </p>
        
    </div>

    <script src="./main.js"></script>
</body>
</html>
